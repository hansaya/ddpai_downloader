replicaCount: 1

# fullnameOverride forces Deployment/Service/PVC names to "ddpai-downloader" instead of "ddpai-downloader-ddpai-downloader"
fullnameOverride: "ddpai-downloader"

image:
  repository: ghcr.io/hansaya/ddpai_downloader
  tag: "v1.0.0-alpha-2"
  pullPolicy: IfNotPresent

env:
  HTTP_PORT: "8080"
  STORAGE_PATH: "/media/dashcam"
  RECORDING_HISTORY: "336h"
  TIMEOUT: "180s"
  # Set to your camera's IANA timezone so file mtimes match filename timestamps (e.g. America/Chicago, Europe/Berlin).
  # Required when downloader runs in UTC (K8s) but camera records in local time.
  # CAMERA_TIMEZONE: "America/Chicago"

securityContext:
  runAsUser: 1004
  runAsGroup: 1004
  fsGroup: 1004

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: true
  existingClaim: ""
  mountPath: /media
  # Optional: create PVC instead of existingClaim
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

podAnnotations: {}

resources: {}
